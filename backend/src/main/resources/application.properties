# ============================================================================
# HYPERLOCAL SERVICE MARKETPLACE - APPLICATION CONFIGURATION
# ============================================================================

# Server Configuration
server.port=8080
server.error.include-message=always

# Application Name
spring.application.name=hyperlocal-marketplace

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hyperlocal_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail Server Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger / OpenAPI Documentation Configurations
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Multipart File Upload Settings (5MB maximum)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom Security / JWT Configuration
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Cloudinary Integration (Image Upload)
cloudinary.cloud-name=dmycloudname
cloudinary.api-key=123456789012345
cloudinary.api-secret=dummy_cloudinary_secret_key

# Razorpay Payment Gateway Configurations
razorpay.key-id=rzp_test_dummykey
razorpay.key-secret=dummy_razorpay_secret_key

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.hyperlocalmarketplace=DEBUG
